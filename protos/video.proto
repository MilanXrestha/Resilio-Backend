syntax = "proto3";

package video;

// Video entity representing a video track (short reel or long-form therapy session)
message Video {
  string id = 1;
  string title = 2;
  string description = 3;
  string artist_name = 4;
  
  // Video URLs
  string video_url = 5;
  string thumbnail_url = 6;
  string cover_image_url = 7;
  
  // Metadata
  int32 duration_seconds = 8;
  string category_id = 9;
  repeated string mood_tags = 10;
  
  // Video type: 'short' or 'long'
  string video_type = 11;
  
  // Aspect ratio (9:16 for shorts, 16:9 for long videos)
  double aspect_ratio = 12;
  
  // Categorization
  bool is_featured = 13;
  bool is_premium = 14;
  bool is_active = 15;
  int32 sort_order = 16;
  
  // Stats
  int32 play_count = 17;
  int32 like_count = 18;
  int32 share_count = 19;
  
  // Timestamps
  string created_at = 20;
  string updated_at = 21;
}

// Request/Response messages
message GetVideosRequest {
  string video_type = 1; // 'short', 'long', or empty for all
  string category_id = 2;
  bool featured_only = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message GetVideosResponse {
  repeated Video videos = 1;
  int32 total_count = 2;
}

message GetVideoByIdRequest {
  string video_id = 1;
}

message VideoResponse {
  Video video = 1;
}

message IncrementPlayCountRequest {
  string video_id = 1;
}

message PlayCountResponse {
  int32 new_count = 1;
}
