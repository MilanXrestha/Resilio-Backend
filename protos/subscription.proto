syntax = "proto3";

package resilio.subscription;

import "common.proto";

option go_package = "github.com/resilio/backend/proto/subscription";

// Subscription service for managing user premium status and payments

message Subscription {
  string id = 1;
  string user_id = 2;
  string plan_id = 3;
  string status = 4;
  string start_date = 5;
  string end_date = 6;
  string payment_method = 7;
  string last_transaction_id = 8;
  bool is_auto_renew = 9;
  string created_at = 10;
  string updated_at = 11;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string subscription_id = 3;
  string payment_provider = 4;
  string payment_provider_transaction_id = 5;
  double amount = 6;
  string currency = 7;
  string status = 8;
  string plan_id = 9;
  string created_at = 10;
}

message GetSubscriptionRequest {
  string user_id = 1;
}

message UpdateSubscriptionRequest {
  string user_id = 1;
  string plan_id = 2;
  string status = 3;
  string payment_provider = 4;
  string payment_provider_transaction_id = 5;
  double amount = 6;
  string currency = 7;
}

message ListTransactionsRequest {
  string user_id = 1;
  resilio.common.PaginationRequest pagination = 2;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  resilio.common.PaginationResponse pagination = 2;
}

service SubscriptionService {
  rpc GetSubscription(GetSubscriptionRequest) returns (Subscription);
  rpc UpdateSubscription(UpdateSubscriptionRequest) returns (Subscription);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
}
